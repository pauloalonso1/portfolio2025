<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        @font-face { font-family: TTHovesD; src: url('fonts/TTHovesDemiBold.otf'); }
        @font-face { font-family: TTHovesM; src: url('fonts/TTHovesMedium.otf'); }
        @font-face { font-family: TTHovesR; src: url('fonts/TTHovesRegular.otf'); }

        :root {
            --bg:       #181818;
            --border:   #272727;
            --text:     #e9e9e9;
            --muted:    #555555;
            --orange:   #F56200;
            --orange-h: #FF6C1F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: TTHovesM;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 20px;
        }

        /* ── Container ── */
        .bio {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        /* ── Profile ── */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            border: 1.5px solid var(--border);
        }

        .profile-name {
            font-family: TTHovesD;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .profile-role {
            font-family: TTHovesR;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
        }

        /* ── Links wrapper ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── MENTORIA CTA — Shiny Button ── */
        @property --gradient-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @property --gradient-angle-offset {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @property --gradient-percent {
            syntax: "<percentage>";
            initial-value: 5%;
            inherits: false;
        }

        @property --gradient-shine {
            syntax: "<color>";
            initial-value: white;
            inherits: false;
        }

        .shiny-cta {
            --shiny-cta-bg:               #0f0f0f;
            --shiny-cta-bg-subtle:        #1a1818;
            --shiny-cta-fg:               #ffffff;
            --shiny-cta-highlight:        #F56200;
            --shiny-cta-highlight-subtle: #ff8c4a;
            --animation:   gradient-angle linear infinite;
            --duration:    3s;
            --shadow-size: 2px;
            --transition:  800ms cubic-bezier(0.25, 1, 0.5, 1);

            isolation: isolate;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            outline-offset: 4px;
            width: 100%;
            min-height: 56px;
            padding: 1rem 2rem;
            font-family: TTHovesD;
            font-size: 15px;
            letter-spacing: 0.1px;
            border: 1px solid transparent;
            border-radius: 360px;
            color: var(--shiny-cta-fg);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(var(--shiny-cta-bg), var(--shiny-cta-bg)) padding-box,
                conic-gradient(
                    from calc(var(--gradient-angle) - var(--gradient-angle-offset)),
                    transparent,
                    var(--shiny-cta-highlight)        var(--gradient-percent),
                    var(--gradient-shine)             calc(var(--gradient-percent) * 2),
                    var(--shiny-cta-highlight)        calc(var(--gradient-percent) * 3),
                    transparent                       calc(var(--gradient-percent) * 4)
                ) border-box;
            box-shadow: inset 0 0 0 1px var(--shiny-cta-bg-subtle);
            transition: var(--transition);
            transition-property: --gradient-angle-offset, --gradient-percent, --gradient-shine;
        }

        .shiny-cta::before,
        .shiny-cta::after,
        .shiny-cta span::before {
            content: "";
            pointer-events: none;
            position: absolute;
            inset-inline-start: 50%;
            inset-block-start: 50%;
            translate: -50% -50%;
            z-index: -1;
        }

        .shiny-cta:active { translate: 0 1px; }

        /* Dots pattern */
        .shiny-cta::before {
            --size:     calc(100% - var(--shadow-size) * 3);
            --position: 2px;
            --space:    calc(var(--position) * 2);
            width: var(--size);
            height: var(--size);
            background: radial-gradient(
                circle at var(--position) var(--position),
                white calc(var(--position) / 4),
                transparent 0
            ) padding-box;
            background-size: var(--space) var(--space);
            background-repeat: space;
            mask-image: conic-gradient(
                from calc(var(--gradient-angle) + 45deg),
                black,
                transparent 10% 90%,
                black
            );
            border-radius: inherit;
            opacity: 0.4;
            z-index: -1;
        }

        /* Inner shimmer */
        .shiny-cta::after {
            --animation: shimmer linear infinite;
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(-50deg, transparent, var(--shiny-cta-highlight), transparent);
            mask-image: radial-gradient(circle at bottom, transparent 40%, black);
            opacity: 0.6;
        }

        .shiny-cta span { z-index: 1; display: flex; align-items: center; gap: 10px; }

        .shiny-cta span::before {
            --size: calc(100% + 1rem);
            width: var(--size);
            height: var(--size);
            box-shadow: inset 0 -1ex 2rem 4px var(--shiny-cta-highlight);
            opacity: 0;
            transition: opacity var(--transition);
            animation: calc(var(--duration) * 1.5) breathe linear infinite;
        }

        /* Animate */
        .shiny-cta,
        .shiny-cta::before,
        .shiny-cta::after {
            animation:
                var(--animation) var(--duration),
                var(--animation) calc(var(--duration) / 0.4) reverse paused;
            animation-composition: add;
        }

        .shiny-cta:is(:hover, :focus-visible) {
            --gradient-percent:      20%;
            --gradient-angle-offset: 95deg;
            --gradient-shine:        var(--shiny-cta-highlight-subtle);
        }

        .shiny-cta:is(:hover, :focus-visible),
        .shiny-cta:is(:hover, :focus-visible)::before,
        .shiny-cta:is(:hover, :focus-visible)::after {
            animation-play-state: running;
        }

        .shiny-cta:is(:hover, :focus-visible) span::before { opacity: 1; }

        @keyframes gradient-angle { to { --gradient-angle: 360deg; } }
        @keyframes shimmer         { to { rotate: 360deg; } }
        @keyframes breathe {
            from, to { scale: 1; }
            50%       { scale: 1.2; }
        }

        /* ── Regular link group ── */
        .link-group {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            min-height: 50px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            font-family: TTHovesM;
            font-size: 14px;
            letter-spacing: -0.1px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .link-btn:last-child {
            border-bottom: none;
        }

        .link-btn:hover {
            background: #e9e9e9;
            color: #181818;
        }

        .link-btn:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: -2px;
            position: relative;
            z-index: 1;
        }

        .link-btn i.icon {
            font-size: 14px;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .link-btn span { flex: 1; }

        .link-btn i.arrow {
            font-size: 11px;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            flex-shrink: 0;
        }

        .link-btn:hover i.arrow {
            opacity: 0.4;
            transform: translateX(0);
        }

        /* ── Footer ── */
        .bio-footer {
            font-family: TTHovesR;
            font-size: 12px;
            color: #303030;
        }

        .bio-footer a {
            color: #404040;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .bio-footer a:hover { color: var(--text); }

        /* Lang Switch */
        .bio-lang { align-self: flex-end; }
        .lang-switch { display: flex; align-items: center; gap: 8px; }
        .lang-opt {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-family: TTHovesM;
            font-size: 13px;
            padding: 0;
            opacity: 0.5;
            transition: opacity 0.2s, color 0.2s;
        }
        .lang-opt.active { opacity: 1; color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
        .lang-sep { color: var(--muted); font-size: 13px; opacity: 0.4; }

        @media (max-width: 480px) {
            body { padding: 48px 16px; }
        }
    </style>
</head>
