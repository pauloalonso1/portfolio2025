<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paulo Alonso — UI/UX Designer, Graphic Design & AI">
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">
    <title>Paulo Alonso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @font-face { font-family: TTHovesD; src: url('fonts/TTHovesDemiBold.otf'); }
        @font-face { font-family: TTHovesM; src: url('fonts/TTHovesMedium.otf'); }
        @font-face { font-family: TTHovesR; src: url('fonts/TTHovesRegular.otf'); }

        :root {
            --bg:       #181818;
            --border:   #272727;
            --text:     #e9e9e9;
            --muted:    #555555;
            --orange:   #F56200;
            --orange-h: #FF6C1F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: TTHovesM;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 20px;
        }

        /* ── Container ── */
        .bio {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        /* ── Profile ── */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            border: 1.5px solid var(--border);
        }

        .profile-name {
            font-family: TTHovesD;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .profile-role {
            font-family: TTHovesR;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
        }

        /* ── Links wrapper ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── MENTORIA CTA ── */
        .btn-mentoria {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            min-height: 56px;
            padding: 16px 24px;
            background: var(--orange);
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            font-family: TTHovesD;
            font-size: 15px;
            letter-spacing: 0.1px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-mentoria:hover {
            background: var(--orange-h);
        }

        .btn-mentoria:focus-visible {
            outline: 2px solid var(--orange);
            outline-offset: 3px;
        }

        /* ── Regular link group ── */
        .link-group {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            min-height: 50px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            font-family: TTHovesM;
            font-size: 14px;
            letter-spacing: -0.1px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .link-btn:last-child {
            border-bottom: none;
        }

        .link-btn:hover {
            background: #e9e9e9;
            color: #181818;
        }

        .link-btn:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: -2px;
            position: relative;
            z-index: 1;
        }

        .link-btn i.icon {
            font-size: 14px;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .link-btn span { flex: 1; }

        .link-btn i.arrow {
            font-size: 11px;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            flex-shrink: 0;
        }

        .link-btn:hover i.arrow {
            opacity: 0.4;
            transform: translateX(0);
        }

        /* ── Footer ── */
        .bio-footer {
            font-family: TTHovesR;
            font-size: 12px;
            color: #303030;
        }

        .bio-footer a {
            color: #404040;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .bio-footer a:hover { color: var(--text); }

        @media (max-width: 480px) {
            body { padding: 48px 16px; }
        }
    </style>
</head>
